<!-- Recent Expenses Component -->
{% for expense in expenses %}
    <div class="flex items-center justify-between py-3 border-b border-gray-700 last:border-b-0">
        <div class="flex-1">
            <p class="text-white font-medium">{{ expense.title }}</p>
            <p class="text-sm text-gray-400">{{ expense.get_category_display }} • {{ expense.date|date:"M d, Y" }}</p>
        </div>
        <p class="text-white font-bold">₹{{ expense.amount }}</p>
    </div>
{% empty %}
    <p class="text-center text-gray-400 py-8">No recent transactions</p>
{% endfor %}
